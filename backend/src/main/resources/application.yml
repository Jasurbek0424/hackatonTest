server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/finpilot
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

# Swagger / OpenAPI (SpringDoc)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
